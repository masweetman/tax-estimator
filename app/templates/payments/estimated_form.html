{% extends "base.html" %}
{% block title %}{% if record %}Edit{% else %}Add{% endif %} Estimated Payment – {{ tax_year.year }}{% endblock %}
{% block content %}
<h2>{% if record %}Edit{% else %}Add{% endif %} Estimated Tax Payment</h2>
<form method="post" class="mt-3" style="max-width:520px">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="mb-3">
    <label class="form-label">Jurisdiction</label>
    <select name="jurisdiction" class="form-select" required>
      {% for val, label in jurisdictions %}
      <option value="{{ val }}" {{ 'selected' if record and record.jurisdiction == val }}>{{ label }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">Quarter</label>
    <select name="quarter" class="form-select" required>
      {% for q in quarters %}
      <option value="{{ q }}" {{ 'selected' if record and record.quarter == q }}>{{ q }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">Date Paid</label>
    <input name="date_paid" type="date" class="form-control" required
           value="{{ record.date_paid.isoformat() if record else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Amount ($)</label>
    <input name="amount" type="number" step="0.01" min="0" class="form-control" required
           value="{{ '%.2f'|format(record.amount) if record else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Notes</label>
    <textarea name="notes" class="form-control" rows="2">{{ record.notes if record else '' }}</textarea>
  </div>
  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{{ url_for('payments.estimated_list', year=tax_year.year) }}" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
