{% extends "base.html" %}
{% block title %}Two-Factor Authentication — Tax Estimator{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="card-title mb-1 text-center">
          <i class="bi bi-shield-lock me-2"></i>Two-Factor Authentication
        </h4>
        <p class="text-muted small text-center mb-4">
          Enter the 6-digit code from your authenticator app.
        </p>

        <form method="post" action="{{ url_for('auth.totp_verify') }}" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label for="token" class="form-label">Verification Code</label>
            <input type="text"
                   id="token"
                   name="token"
                   class="form-control form-control-lg text-center"
                   inputmode="numeric"
                   pattern="[0-9]{6}"
                   maxlength="6"
                   autocomplete="one-time-code"
                   placeholder="000000"
                   required
                   autofocus>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Verify</button>
          </div>
        </form>
      </div>
    </div>

    <div class="text-center mt-3">
      <a href="{{ url_for('auth.login') }}" class="text-muted small">
        <i class="bi bi-arrow-left me-1"></i>Back to login
      </a>
    </div>
  </div>
</div>
{% endblock %}
