{% extends "base.html" %}
{% block title %}{% if record %}Edit{% else %}Add{% endif %} Interest Income – {{ tax_year.year }}{% endblock %}
{% block content %}
<h2>{% if record %}Edit{% else %}Add{% endif %} Interest Income</h2>
<form method="post" class="mt-3" style="max-width:480px">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="mb-3">
    <label class="form-label">Payer (bank / institution)</label>
    <input name="payer" class="form-control" required
           value="{{ record.payer if record else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Amount ($)</label>
    <input name="amount" type="number" step="0.01" min="0" class="form-control" required
           value="{{ '%.2f'|format(record.amount) if record else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Notes</label>
    <textarea name="notes" class="form-control" rows="2">{{ record.notes if record else '' }}</textarea>
  </div>
  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{{ url_for('deductions.interest_list', year=tax_year.year) }}" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
