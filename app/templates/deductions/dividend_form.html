{% extends "base.html" %}
{% block title %}{% if record %}Edit{% else %}Add{% endif %} Dividend Income – {{ tax_year.year }}{% endblock %}
{% block content %}
<h2>{% if record %}Edit{% else %}Add{% endif %} Dividend Income</h2>
<form method="post" class="mt-3" style="max-width:540px">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="mb-3">
    <label class="form-label">Payer (fund / brokerage)</label>
    <input name="payer" class="form-control" required
           value="{{ record.payer if record else '' }}">
  </div>
  <div class="row g-2 mb-3">
    <div class="col">
      <label class="form-label">Ordinary Dividends ($) <span class="text-muted small">1099-DIV Box 1a</span></label>
      <input name="ordinary_dividends" type="number" step="0.01" min="0" class="form-control" required
             value="{{ '%.2f'|format(record.ordinary_dividends) if record else '' }}">
    </div>
    <div class="col">
      <label class="form-label">Qualified Dividends ($) <span class="text-muted small">Box 1b</span></label>
      <input name="qualified_dividends" type="number" step="0.01" min="0" class="form-control"
             value="{{ '%.2f'|format(record.qualified_dividends) if record else '0.00' }}">
      <div class="form-text">Must be ≤ ordinary dividends. Taxed at LTCG rates.</div>
    </div>
  </div>
  <div class="mb-3">
    <label class="form-label">Notes</label>
    <textarea name="notes" class="form-control" rows="2">{{ record.notes if record else '' }}</textarea>
  </div>
  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{{ url_for('deductions.dividend_list', year=tax_year.year) }}" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
