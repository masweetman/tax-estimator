{% extends "base.html" %}
{% block title %}{% if record %}Edit{% else %}Add{% endif %} Capital Gain – {{ tax_year.year }}{% endblock %}
{% block content %}
<h2>{% if record %}Edit{% else %}Add{% endif %} Capital Gain / Loss</h2>
<form method="post" class="mt-3" style="max-width:560px">
  <div class="mb-3">
    <label class="form-label">Person</label>
    <input name="person" class="form-control" required value="{{ record.person if record else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Description</label>
    <input name="description" class="form-control" required value="{{ record.description if record else '' }}">
  </div>
  <div class="row g-2 mb-3">
    <div class="col">
      <label class="form-label">Proceeds ($)</label>
      <input name="proceeds" type="number" step="0.01" min="0" class="form-control" required
             value="{{ '%.2f'|format(record.proceeds) if record else '' }}">
    </div>
    <div class="col">
      <label class="form-label">Cost Basis ($)</label>
      <input name="cost_basis" type="number" step="0.01" min="0" class="form-control" required
             value="{{ '%.2f'|format(record.cost_basis) if record else '' }}">
    </div>
  </div>
  <div class="row g-2 mb-3">
    <div class="col">
      <label class="form-label">Acquisition Date</label>
      <input name="acquisition_date" type="date" class="form-control" required
             value="{{ record.acquisition_date.isoformat() if record else '' }}">
    </div>
    <div class="col">
      <label class="form-label">Sale Date</label>
      <input name="sale_date" type="date" class="form-control" required
             value="{{ record.sale_date.isoformat() if record else '' }}">
    </div>
  </div>
  <div class="mb-3 form-check">
    <input name="is_long_term" value="true" type="checkbox" class="form-check-input" id="is_long_term"
           {{ 'checked' if record and record.is_long_term }}>
    <label class="form-check-label" for="is_long_term">Long-term (held &gt; 1 year)</label>
  </div>
  <div class="mb-3">
    <label class="form-label">Notes</label>
    <textarea name="notes" class="form-control" rows="2">{{ record.notes if record else '' }}</textarea>
  </div>
  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{{ url_for('deductions.capital_gains_list', year=tax_year.year) }}" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
