{% extends "base.html" %}
{% block title %}{% if record %}Edit{% else %}Add{% endif %} Deduction – {{ tax_year.year }}{% endblock %}
{% block content %}
<h2>{% if record %}Edit{% else %}Add{% endif %} Itemized Deduction</h2>
<form method="post" class="mt-3" style="max-width:520px">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="mb-3">
    <label class="form-label">Category</label>
    <select name="category" class="form-select" required>
      {% for cat in categories %}
      <option value="{{ cat }}" {{ 'selected' if record and record.category == cat }}>{{ cat|replace('_',' ')|title }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">Description</label>
    <input name="description" class="form-control" required value="{{ record.description if record else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Date</label>
    <input name="date" type="date" class="form-control" required
           value="{{ record.date.isoformat() if record else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Amount ($)</label>
    <input name="amount" type="number" step="0.01" min="0" class="form-control" required
           value="{{ '%.2f'|format(record.amount) if record else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Notes</label>
    <textarea name="notes" class="form-control" rows="2">{{ record.notes if record else '' }}</textarea>
  </div>
  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{{ url_for('deductions.itemized_list', year=tax_year.year) }}" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
