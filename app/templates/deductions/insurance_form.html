{% extends "base.html" %}
{% block title %}{% if record %}Edit{% else %}Add{% endif %} Insurance – {{ tax_year.year }}{% endblock %}
{% block content %}
<h2>{% if record %}Edit{% else %}Add{% endif %} Insurance Premium</h2>
<form method="post" class="mt-3" style="max-width:520px">
  <div class="mb-3">
    <label class="form-label">Person</label>
    <input name="person" class="form-control" required value="{{ record.person if record else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Insurance Type</label>
    <select name="insurance_type" class="form-select" required>
      {% for t in insurance_types %}
      <option value="{{ t }}" {{ 'selected' if record and record.insurance_type == t }}>{{ t|title }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3 form-check">
    <input name="is_self_employed" value="true" type="checkbox" class="form-check-input" id="is_se"
           {{ 'checked' if record and record.is_self_employed }}>
    <label class="form-check-label" for="is_se">Self-employed deductible premium</label>
  </div>
  <div class="mb-3">
    <label class="form-label">Date</label>
    <input name="date" type="date" class="form-control" required
           value="{{ record.date.isoformat() if record else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Amount ($)</label>
    <input name="amount" type="number" step="0.01" min="0" class="form-control" required
           value="{{ '%.2f'|format(record.amount) if record else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Notes</label>
    <textarea name="notes" class="form-control" rows="2">{{ record.notes if record else '' }}</textarea>
  </div>
  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{{ url_for('deductions.insurance_list', year=tax_year.year) }}" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
