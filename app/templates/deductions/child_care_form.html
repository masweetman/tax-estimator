{% extends "base.html" %}
{% block title %}{% if record %}Edit{% else %}Add{% endif %} Child Care – {{ tax_year.year }}{% endblock %}
{% block content %}
<h2>{% if record %}Edit{% else %}Add{% endif %} Child Care Expense</h2>
<form method="post" class="mt-3" style="max-width:520px">
  <div class="mb-3">
    <label class="form-label">Provider Name</label>
    <input name="provider" class="form-control" required value="{{ record.provider if record else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Child Name</label>
    <input name="child_name" class="form-control" value="{{ record.child_name if record else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Date</label>
    <input name="date" type="date" class="form-control" required
           value="{{ record.date.isoformat() if record else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Amount ($)</label>
    <input name="amount" type="number" step="0.01" min="0" class="form-control" required
           value="{{ '%.2f'|format(record.amount) if record else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Notes</label>
    <textarea name="notes" class="form-control" rows="2">{{ record.notes if record else '' }}</textarea>
  </div>
  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{{ url_for('deductions.child_care_list', year=tax_year.year) }}" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
