{% extends "base.html" %}
{% block title %}{% if record %}Edit{% else %}Add{% endif %} Mileage – {{ tax_year.year }}{% endblock %}
{% block content %}
<h2>{% if record %}Edit{% else %}Add{% endif %} Mileage Entry</h2>
<form method="post" class="mt-3" style="max-width:520px">
  <div class="mb-3">
    <label class="form-label">Vehicle</label>
    <input name="vehicle_name" class="form-control" required value="{{ record.vehicle_name if record else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Date</label>
    <input name="date" type="date" class="form-control" required
           value="{{ record.date.isoformat() if record else '' }}">
  </div>
  <div class="row g-2 mb-3">
    <div class="col">
      <label class="form-label">Odometer Start</label>
      <input name="odometer_start" type="number" min="0" class="form-control"
             value="{{ record.odometer_start if record else '' }}">
    </div>
    <div class="col">
      <label class="form-label">Odometer End</label>
      <input name="odometer_end" type="number" min="0" class="form-control"
             value="{{ record.odometer_end if record else '' }}">
    </div>
  </div>
  <div class="mb-3">
    <label class="form-label">Business Miles</label>
    <input name="business_miles" type="number" step="0.1" min="0" class="form-control" required
           value="{{ '%.1f'|format(record.business_miles) if record else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Purpose</label>
    <input name="purpose" class="form-control" value="{{ record.purpose if record else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Notes</label>
    <textarea name="notes" class="form-control" rows="2">{{ record.notes if record else '' }}</textarea>
  </div>
  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{{ url_for('vehicles.mileage_list', year=tax_year.year) }}" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
