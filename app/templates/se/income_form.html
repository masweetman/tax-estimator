{% extends "base.html" %}
{% block title %}{% if record %}Edit{% else %}Add{% endif %} SE Income – {{ tax_year.year }}{% endblock %}
{% block content %}
<h2>{% if record %}Edit{% else %}Add{% endif %} Self-Employment Income</h2>
<form method="post" class="mt-3" style="max-width:520px">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="mb-3">
    <label class="form-label">Person</label>
    <select name="person" class="form-select" required>
      <option value="Person 1" {{ 'selected' if record and record.person == 'Person 1' }}>{{ person1_name }}</option>
      <option value="Person 2" {{ 'selected' if record and record.person == 'Person 2' }}>{{ person2_name }}</option>
    </select>
  </div>
  {% if llcs %}
  <div class="mb-3">
    <label class="form-label">Single-Member LLC <span class="text-muted small">(optional)</span></label>
    <select name="llc_id" class="form-select">
      <option value="">— None —</option>
      {% for llc in llcs %}
      <option value="{{ llc.id }}" {{ 'selected' if record and record.llc_id == llc.id }}>{{ llc.name }} ({{ person_display(llc.person) }})</option>
      {% endfor %}
    </select>
  </div>
  {% endif %}
  <div class="mb-3">
    <label class="form-label">Client / Payer</label>
    <input name="client" class="form-control" value="{{ record.client if record else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Date</label>
    <input name="date" type="date" class="form-control" required
           value="{{ record.date.isoformat() if record else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Amount ($)</label>
    <input name="amount" type="number" step="0.01" min="0" class="form-control" required
           value="{{ '%.2f'|format(record.amount) if record else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Category</label>
    <select name="category" class="form-select">
      {% for cat in categories %}
      <option value="{{ cat }}" {{ 'selected' if record and record.category == cat }}>{{ cat|replace('_',' ')|title }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">Notes</label>
    <textarea name="notes" class="form-control" rows="2">{{ record.notes if record else '' }}</textarea>
  </div>
  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{{ url_for('se.income_list', year=tax_year.year) }}" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
